services:
  postgres:
    image: postgres:16-alpine
    container_name: evbooking-postgres
    environment:
      POSTGRES_DB: evbooking
      POSTGRES_USER: evbooking
      POSTGRES_PASSWORD: evbooking
    ports:
      - "5432:5432"
    volumes:
      - evbooking-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evbooking -d evbooking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  evbooking-pg-data:
