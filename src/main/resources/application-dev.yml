spring:
  datasource:
    # Override with env vars SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
    # if your local Postgres uses different credentials.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evbooking}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    com.smartcharge.evbooking: DEBUG
    org.hibernate.SQL: DEBUG

app:
  seed:
    enabled: true
