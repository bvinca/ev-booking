<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Modify booking · EV Booking', null)}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container" style="max-width: 640px;">
    <a th:href="@{/dashboard/bookings}" class="btn btn-link" style="padding-left:0;">← My bookings</a>

    <div class="page-head">
        <div>
            <h1>Modify booking</h1>
            <p class="sub">
                <strong th:text="${booking.connector.station.name}">Station</strong>
                · <span th:text="${booking.connector.connectorType}">Type</span>
                · <span th:text="${booking.connector.powerKw}">22</span> kW
            </p>
        </div>
    </div>

    <div th:if="${flashError}"   class="alert alert-danger"  th:text="${flashError}"></div>
    <div th:if="${flashSuccess}" class="alert alert-success" th:text="${flashSuccess}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/dashboard/bookings/{id}/edit(id=${booking.id})}" method="post">

                <div class="mb-3">
                    <label class="form-label" for="startTime">New start (UTC)</label>
                    <input class="form-control"
                           id="startTime" name="startTime"
                           type="datetime-local"
                           th:attr="step=${slotMinutes * 60}"
                           th:value="${currentStart}"
                           required>
                    <div class="form-text">
                        Must align to <strong th:text="${slotMinutes}">30</strong>-minute boundaries.
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="endTime">New end (UTC)</label>
                    <input class="form-control"
                           id="endTime" name="endTime"
                           type="datetime-local"
                           th:attr="step=${slotMinutes * 60}"
                           th:value="${currentEnd}"
                           required>
                </div>

                <div class="alert alert-info" style="font-size:0.9rem;">
                    Connector can't be changed via modify. To switch connector, cancel this booking
                    and create a new one.
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save changes</button>
                    <a class="btn btn-outline-secondary" th:href="@{/dashboard/bookings}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
