<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard · EV Booking')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <div class="page-head">
        <div>
            <h1>Welcome,
                <span th:with="p=${#authentication?.principal}"
                      th:text="${p instanceof T(com.smartcharge.evbooking.security.SecurityUser) ? p.fullName : #authentication?.name}">Driver</span>
            </h1>
            <p class="sub">Your charging at a glance.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/stations}">Find a station →</a>
    </div>

    <div class="row g-3">
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom: 0.25rem;">Upcoming</div>
                    <div class="display-6" th:text="${#lists.size(upcoming)}">0</div>
                    <div class="text-muted small">Bookings in the future</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom: 0.25rem;">Total</div>
                    <div class="display-6" th:text="${totalCount}">0</div>
                    <div class="text-muted small">All-time reservations</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-4">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom: 0.5rem;">Manage</div>
                    <a class="btn btn-outline-secondary w-100" th:href="@{/dashboard/bookings}">My bookings</a>
                </div>
            </div>
        </div>
    </div>

    <h2 class="section-heading mt-5">Next bookings</h2>
    <div class="table-responsive" th:if="${not #lists.isEmpty(upcoming)}">
    <table class="table">
        <thead><tr><th>When (UTC)</th><th>Station</th><th>Connector</th><th></th></tr></thead>
        <tbody>
        <tr th:each="b : ${upcoming}">
            <td th:text="${#temporals.format(b.startTime, 'yyyy-MM-dd HH:mm')}">when</td>
            <td th:text="${b.connector.station.name}">station</td>
            <td>
                <span th:text="${b.connector.connectorType}">type</span> ·
                <span th:text="${b.connector.powerKw}">22</span> kW
            </td>
            <td class="text-end">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/dashboard/bookings}">Manage</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
    <div th:if="${#lists.isEmpty(upcoming)}" class="card">
        <div class="card-body text-center text-muted">
            No upcoming bookings yet. <a th:href="@{/stations}">Browse stations</a> to make one.
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
