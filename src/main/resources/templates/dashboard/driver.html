<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard · EV Booking')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h1>Welcome, <span sec:authentication="principal.fullName">Driver</span></h1>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Upcoming bookings</h5>
                    <p class="display-6" th:text="${#lists.size(upcoming)}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Total bookings</h5>
                    <p class="display-6" th:text="${totalCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Quick actions</h5>
                    <a class="btn btn-primary mb-2 w-100" th:href="@{/stations}">Find a station</a>
                    <a class="btn btn-outline-secondary w-100" th:href="@{/dashboard/bookings}">My bookings</a>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mt-5">Next bookings</h3>
    <table class="table" th:if="${not #lists.isEmpty(upcoming)}">
        <thead><tr><th>When</th><th>Station</th><th>Connector</th><th></th></tr></thead>
        <tbody>
        <tr th:each="b : ${upcoming}">
            <td th:text="${#temporals.format(b.startTime, 'yyyy-MM-dd HH:mm')} + ' UTC'">when</td>
            <td th:text="${b.connector.station.name}">station</td>
            <td th:text="${b.connector.connectorType} + ' · ' + ${b.connector.powerKw} + ' kW'">connector</td>
            <td><a class="btn btn-sm btn-link" th:href="@{/dashboard/bookings}">Manage</a></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(upcoming)}" class="text-muted">No upcoming bookings yet.</p>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
