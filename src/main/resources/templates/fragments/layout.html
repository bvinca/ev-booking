<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:fragment="head(title, pageCss)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <title th:text="${title} ?: 'EV Booking'">EV Booking</title>

    <!-- Fonts: Plus Jakarta Sans (display) + Inter (text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">

    <!-- Leaflet (must come BEFORE app.css overrides) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" th:href="@{/css/app.css}">
    <!-- Per-page stylesheet, e.g. the homepage marketing layout in /css/home.css -->
    <link rel="stylesheet" th:if="${pageCss}" th:href="${pageCss}">
    <script th:src="@{/js/nav.js}" defer></script>
</head>
<body>

<header th:fragment="navbar" class="app-nav">
    <div class="container app-nav-inner">
        <a class="app-brand" th:href="@{/}">
            <span class="logo">⚡</span>
            <span class="app-brand-text">EV Booking</span>
        </a>

        <button type="button" class="nav-toggle" data-nav-toggle
                aria-expanded="false" aria-controls="main-nav" aria-label="Open menu">
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>

        <nav id="main-nav" class="nav-panel" aria-label="Main">
            <ul class="nav-links">
                <li><a th:href="@{/stations}">Stations</a></li>
                <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">Dashboard</a></li>
                <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard/profile}">Profile</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">Admin</a></li>

                <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                <li sec:authorize="!isAuthenticated()">
                    <a class="is-cta" th:href="@{/register}">Create account</a>
                </li>

                <li sec:authorize="isAuthenticated()" class="nav-user">
                    <span th:with="p=${#authentication?.principal}"
                          th:text="${p instanceof T(com.smartcharge.evbooking.security.SecurityUser) ? p.fullName : #authentication?.name}">
                        User
                    </span>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="linkish nav-logout">Logout</button>
                    </form>
                </li>
            </ul>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="app-footer">
    <div class="container app-footer-inner">
        <span>EV Booking · University of York coursework</span>
        <span>Instance: <code th:text="${@environment.getProperty('app.instance-id')}">instance</code></span>
    </div>
</footer>

</body>
</html>
