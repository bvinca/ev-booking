<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head(${station.name} + ' · EV Booking')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <a th:href="@{/stations}" class="btn btn-link" style="padding-left:0;">← All stations</a>

    <div class="page-head">
        <div>
            <h1 th:text="${station.name}">Station name</h1>
            <p class="sub" th:text="${station.address + ' · ' + station.city}">Address</p>
        </div>
    </div>

    <p th:if="${station.description}" class="text-muted" style="max-width:64ch;" th:text="${station.description}"></p>

    <div class="row g-4 mt-2">
        <div class="col-md-5">
            <h2 class="section-heading">Location</h2>
            <div class="map-frame map-frame--detail">
                <div id="stationMap"></div>
            </div>
        </div>
        <div class="col-md-7">
            <h2 class="section-heading">Connectors</h2>
            <div class="table-responsive">
            <table class="table">
                <thead>
                <tr><th>Type</th><th>Power</th><th>Price / h</th><th>Status</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="c : ${station.connectors}">
                    <td>
                        <strong th:text="${c.connectorType}">Type</strong>
                    </td>
                    <td><span th:text="${c.powerKw}">22</span> kW</td>
                    <td>€<span th:text="${c.pricePerHour}">0.42</span></td>
                    <td>
                        <span th:if="${c.active}" class="badge bg-success">Active</span>
                        <span th:unless="${c.active}" class="badge bg-secondary">Inactive</span>
                    </td>
                    <td class="text-end">
                        <a sec:authorize="hasRole('DRIVER') or hasRole('ADMIN')"
                           th:if="${c.active}"
                           th:href="@{/bookings/new(connectorId=${c.id})}"
                           class="btn btn-primary btn-sm">Book</a>
                        <a sec:authorize="!isAuthenticated()"
                           th:if="${c.active}"
                           th:href="@{/login}"
                           class="btn btn-outline-primary btn-sm">Sign in to book</a>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    const lat = /*[[${station.latitude}]]*/ 0;
    const lng = /*[[${station.longitude}]]*/ 0;
    const name = /*[[${station.name}]]*/ '';
    const map = L.map('stationMap').setView([lat, lng], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd', maxZoom: 19
    }).addTo(map);
    const brandIcon = L.divIcon({
        className: 'ev-marker',
        html: '<div style="width:26px;height:26px;border-radius:50%;background:#00AEEF;border:3px solid #0F172A;box-shadow:0 0 0 2px #00AEEF, 0 4px 12px rgba(0,174,239,0.6);display:grid;place-items:center;color:#0F172A;font-weight:900;font-size:13px;">⚡</div>',
        iconSize: [26, 26], iconAnchor: [13, 13]
    });
    L.marker([lat, lng], { icon: brandIcon }).addTo(map).bindPopup(name).openPopup();
    function refreshMapSize() { map.invalidateSize(); }
    window.addEventListener('resize', refreshMapSize);
    setTimeout(refreshMapSize, 0);
</script>
</body>
</html>
