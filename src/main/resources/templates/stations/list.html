<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Stations · EV Booking', null)}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <div class="page-head">
        <div>
            <h1>Charging stations</h1>
            <p class="sub">Browse and filter the network. Click a marker or row to inspect connectors.</p>
        </div>
    </div>

    <form class="filter-bar row g-3" method="get" th:action="@{/stations}">
        <div class="col-md-4">
            <label class="form-label" for="city">City</label>
            <input class="form-control" id="city" name="city" type="text" placeholder="e.g. York" th:value="${city}">
        </div>
        <div class="col-md-3">
            <label class="form-label" for="type">Connector</label>
            <select class="form-select" id="type" name="type">
                <option value="">Any type</option>
                <option th:each="t : ${connectorTypes}" th:value="${t}" th:text="${t}" th:selected="${type == t}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label" for="minKw">Min power (kW)</label>
            <input class="form-control" id="minKw" name="minKw" type="number" step="0.1" min="0" placeholder="50" th:value="${minKw}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" type="submit">Filter</button>
        </div>
    </form>

    <div class="row g-4">
        <div class="col-lg-7">
            <h2 class="section-heading">Map</h2>
            <div class="map-frame">
                <div id="stationMap"></div>
            </div>
        </div>
        <div class="col-lg-5">
            <h2 class="section-heading">
                <span th:text="${#lists.size(stations)}">0</span> result<span th:if="${#lists.size(stations) != 1}">s</span>
            </h2>
            <div class="station-list">
                <a class="item"
                   th:each="s : ${stations}"
                   th:href="@{/stations/{id}(id=${s.id})}">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div>
                            <div class="name" th:text="${s.name}">Station name</div>
                            <div class="city" th:text="${s.address}">Address</div>
                        </div>
                        <span class="badge" th:text="${s.city}">City</span>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(stations)}" class="card">
                    <div class="card-body text-center text-muted">
                        No stations match those filters. <a th:href="@{/stations}">Clear filters</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:src="@{/js/map.js}"></script>
</body>
</html>
