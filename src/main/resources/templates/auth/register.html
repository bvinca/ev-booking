<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Register · EV Booking')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<div class="auth-wrap">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-sub">It takes about thirty seconds. Free, no card required.</p>

        <form th:action="@{/register}" method="post" th:object="${registerForm}" novalidate>
            <div class="mb-3">
                <label class="form-label" for="fullName">Full name</label>
                <input class="form-control" id="fullName" type="text"
                       th:field="*{fullName}" placeholder="Jane Driver" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email"
                       th:field="*{email}" placeholder="you@example.com" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password"
                       th:field="*{password}" placeholder="At least 8 characters" required>
                <div class="form-text">Use a strong, unique password.</div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input class="form-control" id="confirmPassword" type="password"
                       th:field="*{confirmPassword}" placeholder="Repeat your password" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button class="btn btn-primary" type="submit">Create account</button>
        </form>

        <p class="auth-foot">
            Already have one? <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
