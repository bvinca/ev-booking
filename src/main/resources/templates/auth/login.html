<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Login · EV Booking', null)}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<div class="auth-wrap">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in to manage your bookings and reserve new ones.</p>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been signed out.
        </div>
        <div th:if="${registrationSuccess}" class="alert alert-success">
            Account created. Please sign in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email"
                       placeholder="you@example.com" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password"
                       placeholder="••••••••" required>
            </div>
            <button class="btn btn-primary" type="submit">Sign in</button>
        </form>

        <p class="auth-foot">
            New to EV Booking? <a th:href="@{/register}">Create an account</a>
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
