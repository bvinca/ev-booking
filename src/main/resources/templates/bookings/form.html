<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Book a slot · EV Booking')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container" style="max-width: 820px;">
    <a th:href="@{/stations/{id}(id=${station.id})}" class="btn btn-link" style="padding-left:0;">← Back to station</a>

    <div class="page-head">
        <div>
            <h1>Book a slot</h1>
            <p class="sub">
                <strong th:text="${station.name}">Station</strong>
                · <span th:text="${connector.connectorType}">Type</span>
                · <span th:text="${connector.powerKw}">22</span> kW
                · €<span th:text="${connector.pricePerHour}">0.42</span>/h
            </p>
        </div>
    </div>

    <div th:if="${flashError}"   class="alert alert-danger"  th:text="${flashError}"></div>
    <div th:if="${flashSuccess}" class="alert alert-success" th:text="${flashSuccess}"></div>

    <div class="card">
        <div class="card-body">
            <form method="get" th:action="@{/bookings/new}" class="row g-3 align-items-end mb-4">
                <input type="hidden" name="connectorId" th:value="${connector.id}">
                <div class="col-md-4">
                    <label class="form-label" for="date">Pick a date</label>
                    <input class="form-control" id="date" name="date" type="date" th:value="${date}">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-secondary w-100" type="submit">Show slots</button>
                </div>
                <div class="col-md-5 text-end small text-muted">
                    Each tile is <strong th:text="${slotMinutes}">30</strong> minutes. Click contiguous free
                    tiles to select a window.
                </div>
            </form>

            <h2 class="section-heading">Availability</h2>
            <div id="slots" class="availability-grid mb-3"></div>

            <form id="bookForm" method="post" th:action="@{/bookings}" class="d-none mt-4">
                <input type="hidden" name="connectorId" th:value="${connector.id}">
                <input type="hidden" name="startTime" id="startTime">
                <input type="hidden" name="endTime"   id="endTime">
                <div class="alert alert-info" style="font-size:0.95rem;">
                    Booking from <strong id="startLabel"></strong> to <strong id="endLabel"></strong>.
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Confirm booking</button>
                    <button class="btn btn-link" type="button" id="clearBtn">Clear selection</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:inline="javascript">
    const connectorId = /*[[${connector.id}]]*/ 0;
    const date        = /*[[${#temporals.format(date, 'yyyy-MM-dd')}]]*/ '';
    const slotMinutes = /*[[${slotMinutes}]]*/ 30;
</script>
<script th:src="@{/js/booking.js}"></script>
</body>
</html>
