<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Book a slot · EV Booking')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container" style="max-width: 760px;">
    <a th:href="@{/stations/{id}(id=${station.id})}" class="btn btn-link ps-0">← Back to station</a>

    <h1>Book a slot</h1>
    <p class="text-muted">
        <strong th:text="${station.name}">Station</strong> ·
        <span th:text="${connector.connectorType}">Type</span>
        (<span th:text="${connector.powerKw}">22</span> kW) ·
        £<span th:text="${connector.pricePerHour}">3.50</span>/h
    </p>

    <div th:if="${flashError}"   class="alert alert-danger"  th:text="${flashError}"></div>
    <div th:if="${flashSuccess}" class="alert alert-success" th:text="${flashSuccess}"></div>

    <form method="get" th:action="@{/bookings/new}" class="row g-3 mb-3 align-items-end">
        <input type="hidden" name="connectorId" th:value="${connector.id}">
        <div class="col-auto">
            <label class="form-label" for="date">Date</label>
            <input class="form-control" id="date" name="date" type="date" th:value="${date}">
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit">Show slots</button>
        </div>
    </form>

    <h3>Available slots</h3>
    <p class="text-muted small">
        Click free (green) slots to select a contiguous time window. Each slot is
        <span th:text="${slotMinutes}">30</span> minutes.
    </p>
    <div id="slots" class="availability-grid mb-4"></div>

    <form id="bookForm" method="post" th:action="@{/bookings}" class="d-none">
        <input type="hidden" name="connectorId" th:value="${connector.id}">
        <input type="hidden" name="startTime" id="startTime">
        <input type="hidden" name="endTime"   id="endTime">
        <div class="alert alert-info">
            Booking from <strong id="startLabel"></strong> to <strong id="endLabel"></strong>.
        </div>
        <button class="btn btn-primary" type="submit">Confirm booking</button>
        <button class="btn btn-link" type="button" id="clearBtn">Clear selection</button>
    </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:inline="javascript">
    const connectorId = /*[[${connector.id}]]*/ 0;
    const date        = /*[[${#temporals.format(date, 'yyyy-MM-dd')}]]*/ '';
    const slotMinutes = /*[[${slotMinutes}]]*/ 30;
</script>
<script th:src="@{/js/booking.js}"></script>
</body>
</html>
