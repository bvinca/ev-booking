<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Admin · Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h1>Users</h1>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Roles</th><th>Enabled</th><th>Created</th></tr></thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.fullName}">name</td>
            <td th:text="${u.email}">email</td>
            <td>
                <span th:each="r : ${u.roles}" class="badge bg-info me-1" th:text="${r.name}">role</span>
            </td>
            <td>
                <span th:if="${u.enabled}" class="badge bg-success">Yes</span>
                <span th:unless="${u.enabled}" class="badge bg-warning text-dark">No</span>
            </td>
            <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}">date</td>
        </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
