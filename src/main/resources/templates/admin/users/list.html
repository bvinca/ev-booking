<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Admin · Users')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <div class="page-head">
        <div>
            <h1>Users</h1>
            <p class="sub">Read-only view of the user directory.</p>
        </div>
    </div>

    <div class="table-responsive table-responsive--wide">
    <table class="table">
        <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Roles</th><th>Status</th><th>Created</th></tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td class="text-muted" th:text="${u.id}">1</td>
            <td><strong th:text="${u.fullName}">name</strong></td>
            <td th:text="${u.email}">email</td>
            <td>
                <span th:each="r : ${u.roles}" class="badge bg-info me-1" th:text="${r.name}">role</span>
            </td>
            <td>
                <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                <span th:unless="${u.enabled}" class="badge bg-warning">Disabled</span>
            </td>
            <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd')}">date</td>
        </tr>
        </tbody>
    </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
