<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Admin · Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h1>Admin dashboard</h1>

    <div class="row g-3 my-3">
        <div class="col-md-3"><div class="card"><div class="card-body">
            <h5 class="card-title">Users</h5><p class="display-6" th:text="${userCount}">0</p>
            <a class="btn btn-link p-0" th:href="@{/admin/users}">Manage</a>
        </div></div></div>
        <div class="col-md-3"><div class="card"><div class="card-body">
            <h5 class="card-title">Stations</h5><p class="display-6" th:text="${stationCount}">0</p>
            <a class="btn btn-link p-0" th:href="@{/admin/stations}">Manage</a>
        </div></div></div>
        <div class="col-md-3"><div class="card"><div class="card-body">
            <h5 class="card-title">Connectors</h5><p class="display-6" th:text="${connectorCount}">0</p>
        </div></div></div>
        <div class="col-md-3"><div class="card"><div class="card-body">
            <h5 class="card-title">Bookings</h5><p class="display-6" th:text="${bookingCount}">0</p>
            <a class="btn btn-link p-0" th:href="@{/admin/bookings}">Manage</a>
        </div></div></div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
