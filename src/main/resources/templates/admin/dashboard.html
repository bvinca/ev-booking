<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Admin · Dashboard', null)}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>

<main class="container">
    <div class="page-head">
        <div>
            <h1>Admin</h1>
            <p class="sub">Operational overview.</p>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-sm-6 col-md-3">
            <div class="card stat-card is-interactive">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom:0.25rem;">Users</div>
                    <div class="display-6" th:text="${userCount}">0</div>
                    <a class="btn btn-link" style="padding-left:0;" th:href="@{/admin/users}">Manage →</a>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card stat-card is-interactive">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom:0.25rem;">Stations</div>
                    <div class="display-6" th:text="${stationCount}">0</div>
                    <a class="btn btn-link" style="padding-left:0;" th:href="@{/admin/stations}">Manage →</a>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom:0.25rem;">Connectors</div>
                    <div class="display-6" th:text="${connectorCount}">0</div>
                    <div class="text-muted small">Managed per station</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card stat-card is-interactive">
                <div class="card-body">
                    <div class="section-heading" style="margin-bottom:0.25rem;">Bookings</div>
                    <div class="display-6" th:text="${bookingCount}">0</div>
                    <a class="btn btn-link" style="padding-left:0;" th:href="@{/admin/bookings}">Manage →</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
